name: adaptive_exam_platform
description: Adaptive exam preparation platform (V1 - driver's license).
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  go_router: ^16.0.0
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0
  shared_preferences: ^2.3.0
  crypto: ^3.0.0
  sherpa_onnx: ^1.13.4
  audioplayers: ^6.8.1
  archive: ^4.0.9
  path_provider: ^2.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/curriculum/
    - assets/stories/
